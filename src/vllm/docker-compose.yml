services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    ipc: host
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - "${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/root/.cache/huggingface"
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HUGGING_FACE_HUB_TOKEN:-}"
    command:
      - "--model"
      - "${MODEL:-Qwen/Qwen3-0.6B}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
